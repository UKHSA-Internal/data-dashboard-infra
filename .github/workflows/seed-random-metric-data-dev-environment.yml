name: Seed Random Metric Data (Dev via S3)
run-name: Seed random metric data into `${{ inputs.environment }}` via S3 ingestion

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Personal dev workspace name (for example abcd1234)"
        required: true
        type: string
      points:
        description: "Number of points to generate"
        required: false
        default: "30"
        type: string
      data_type:
        description: "Metric data type"
        required: true
        default: "timeseries"
        type: choice
        options:
          - timeseries
          - headline
      topic:
        description: "Topic"
        required: true
        type: string
      theme:
        description: "Theme"
        required: true
        type: string
      sub_theme:
        description: "Sub-theme"
        required: true
        type: string
      geography:
        description: "Geography display name"
        required: true
        type: string
      geography_type:
        description: "Geography type (for example Nation, Region, UTLA)"
        required: true
        type: string
      geography_code:
        description: "Geography code"
        required: false
        default: "E92000001"
        type: string
      metric_name:
        description: "Metric name"
        required: true
        type: string
      metric_group:
        description: "Metric group"
        required: false
        default: "generated"
        type: string
      include_null_points:
        description: "Include null metric values"
        required: false
        default: false
        type: boolean
      include_erroneous_points:
        description: "Include intentionally invalid points"
        required: false
        default: false
        type: boolean
      include_non_public_points:
        description: "Include non-public points (is_public=false)"
        required: false
        default: false
        type: boolean
      non_public_mode:
        description: "When non-public points are enabled"
        required: false
        default: "some"
        type: choice
        options:
          - some
          - all
      relative_span:
        description: "Relative span, for example '3 years' or '90 days'. Leave empty when using start/end."
        required: false
        type: string
      start_date:
        description: "Start date (YYYY-MM-DD). Use with end_date."
        required: false
        type: string
      end_date:
        description: "End date (YYYY-MM-DD). Use with start_date."
        required: false
        type: string
      metric_min:
        description: "Minimum metric value"
        required: true
        default: "0"
        type: string
      metric_max:
        description: "Maximum metric value"
        required: true
        default: "100"
        type: string
      seed:
        description: "Optional deterministic seed"
        required: false
        type: string
      dry_run:
        description: "Generate locally only (no S3 upload)"
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: "eu-west-2"

permissions:
  id-token: write
  contents: read

jobs:
  validate_environment_name:
    name: Validate environment name
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github/ directory
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github

      - uses: ./.github/actions/validate-environment-name
        with:
          environment: ${{ inputs.environment }}

  seed_random_metric_data:
    name: Seed random metric data
    runs-on: ubuntu-latest
    needs: ["validate_environment_name"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
      - uses: ./.github/actions/setup-terraform
      - uses: ./.github/actions/setup-zsh

      - name: Configure AWS credentials for tools account
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.AWS_REGION }}
          tools-account-role: ${{ secrets.UHD_TERRAFORM_IAM_ROLE }}

      - name: Terraform output
        run: |
          source uhd.sh
          uhd terraform init:layer 20-app
          uhd terraform output ${{ inputs.environment }}
        shell: zsh {0}

      - name: Configure AWS credentials for dev account
        if: ${{ inputs.dry_run != true }}
        uses: ./.github/actions/configure-aws-credentials
        with:
          account-name: "dev"
          aws-region: ${{ env.AWS_REGION }}
          dev-account-role: ${{ secrets.UHD_TERRAFORM_ROLE_DEV }}

      - name: Generate and upload random metric data
        run: |
          source uhd.sh

          cmd=(
            uhd seed-random
            --target "${{ inputs.environment }}"
            --points "${{ inputs.points }}"
            --data-type "${{ inputs.data_type }}"
            --topic "${{ inputs.topic }}"
            --theme "${{ inputs.theme }}"
            --sub-theme "${{ inputs.sub_theme }}"
            --geography "${{ inputs.geography }}"
            --geography-type "${{ inputs.geography_type }}"
            --geography-code "${{ inputs.geography_code }}"
            --metric-name "${{ inputs.metric_name }}"
            --metric-group "${{ inputs.metric_group }}"
            --include-null-points "${{ inputs.include_null_points }}"
            --include-erroneous-points "${{ inputs.include_erroneous_points }}"
            --include-non-public-points "${{ inputs.include_non_public_points }}"
            --non-public-mode "${{ inputs.non_public_mode }}"
            --metric-min "${{ inputs.metric_min }}"
            --metric-max "${{ inputs.metric_max }}"
          )

          if [[ -n "${{ inputs.relative_span }}" ]]; then
            cmd+=(--relative-span "${{ inputs.relative_span }}")
          fi
          if [[ -n "${{ inputs.start_date }}" ]]; then
            cmd+=(--start-date "${{ inputs.start_date }}")
          fi
          if [[ -n "${{ inputs.end_date }}" ]]; then
            cmd+=(--end-date "${{ inputs.end_date }}")
          fi
          if [[ -n "${{ inputs.seed }}" ]]; then
            cmd+=(--seed "${{ inputs.seed }}")
          fi
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            cmd+=(--dry-run)
          fi

          echo "Running: ${cmd[*]}"
          "${cmd[@]}"
        shell: zsh {0}
